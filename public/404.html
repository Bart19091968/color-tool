<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Coloralyze</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="preload" href="/shared.min.css?v=20250418" as="style" />
  <link rel="stylesheet" href="/shared.min.css?v=20250418" />
  <style>
    .not-found { max-width: 600px; margin: 0 auto; padding: 80px 24px; text-align: center; }
    .not-found-code { font-size: 96px; font-weight: 900; color: #e5e7eb; line-height: 1; margin-bottom: 16px; }
    .not-found h1 { font-size: 28px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
    .not-found p { color: #6b7280; margin-bottom: 32px; }
    .not-found-links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .not-found-links a { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; transition: opacity .15s; }
    .not-found-links a:hover { opacity: .8; }
    .btn-primary { background: #1a1a1a; color: #fff; }
    .btn-secondary { background: #f3f4f6; color: #1a1a1a; }
  </style>
</head>
<body>
  <div class="not-found">
    <div class="not-found-code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div class="not-found-links">
      <a href="/" class="btn-primary">Pick color from screen</a>
      <a href="/image" class="btn-secondary">Pick from image</a>
      <a href="/pantone-color-finder" class="btn-secondary">Pantone finder</a>
      <a href="/blog" class="btn-secondary">Blog</a>
    </div>
  </div>
</body>
</html>
